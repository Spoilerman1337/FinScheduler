apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - deployment.yaml
configMapGenerator:
  - name: alloy-logs-config
    files:
      - config.alloy=config.alloy
generatorOptions:
  disableNameSuffixHash: true
