apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - mimir-deployment.yaml
  - mimir-service.yaml
  - pyroscope-deployment.yaml
  - pyroscope-service.yaml
  - prometheus-deployment.yaml
  - prometheus-service.yaml
  - tempo-deployment.yaml
  - tempo-service.yaml
  - loki-deployment.yaml
  - loki-service.yaml
  - alloy-serviceaccount.yaml
  - alloy-clusterrole.yaml
  - alloy-clusterrolebinding.yaml
  - alloy-deployment.yaml
  - grafana-admin-secret.yaml
  - grafana-db-secret.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml
configMapGenerator:
  - name: alloy-logs-config
    files:
      - config.alloy=alloy/config.alloy
  - name: grafana-datasources
    files:
      - datasources.yml=grafana/datasources.yml
  - name: mimir-config
    files:
      - mimir.yaml=mimir/mimir.yaml
  - name: pyroscope-config
    files:
      - pyroscope.yaml=pyroscope/pyroscope.yaml
  - name: tempo-config
    files:
      - tempo.yaml=tempo/tempo.yaml
  - name: loki-config
    files:
      - loki.yml=loki/loki.yml
  - name: prometheus-config
    files:
      - prometheus.yml=prometheus/prometheus.yml
generatorOptions:
  disableNameSuffixHash: true
