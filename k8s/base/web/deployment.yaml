apiVersion: apps/v1
kind: Deployment
metadata:
  name: finscheduler-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finscheduler-web
  template:
    metadata:
      labels:
        app: finscheduler-web
    spec:
      containers:
        - name: web
          image: finscheduler-web:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: finscheduler-web-config
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
